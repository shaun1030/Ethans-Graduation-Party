<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethan's Graduation Party</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #C9A84C; --gold-light: #E8CB7A; --gold-dark: #8B6914;
    --navy: #0D1B2A; --cream: #F8F3E8; --blue-sash: #3BA3D4;
  }
  body {
    background: var(--navy); min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; padding: 2rem; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 30%, rgba(58,163,212,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(201,168,76,0.08) 0%, transparent 50%), var(--navy);
    z-index: 0;
  }
  .stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite alternate; opacity: 0; }
  @keyframes twinkle { 0% { opacity: 0.1; } 100% { opacity: 0.7; } }
  .card {
    position: relative; z-index: 1; max-width: 560px; width: 100%;
    background: linear-gradient(160deg, #16263A 0%, #0D1B2A 50%, #111E30 100%);
    border: 1px solid rgba(201,168,76,0.35); padding: 0; overflow: hidden;
    animation: fadeUp 1s ease forwards; opacity: 0;
    box-shadow: 0 0 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.1) inset;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .top-bar { height: 5px; background: linear-gradient(90deg, transparent, var(--gold-dark), var(--gold), var(--gold-light), var(--gold), var(--gold-dark), transparent); }
  .photo-section { position: relative; height: 320px; overflow: hidden; }
  .photo-section img { width: 100%; height: 100%; object-fit: cover; object-position: top center; filter: brightness(0.75) contrast(1.05); animation: zoomIn 1.5s ease forwards; }
  @keyframes zoomIn { from { transform: scale(1.08); } to { transform: scale(1); } }
  .photo-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, rgba(13,27,42,0.6) 70%, #0D1B2A 100%); }
  .class-badge {
    position: absolute; top: 18px; right: 18px; background: var(--blue-sash); color: white;
    font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.15em;
    padding: 6px 14px; border-radius: 2px; animation: fadeUp 1s 0.5s ease forwards; opacity: 0;
  }
  .content { padding: 2rem 2.5rem 2.5rem; }
  .invite-label {
    font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.35em; color: var(--gold);
    text-transform: uppercase; text-align: center; display: block; margin-bottom: 0.8rem;
    animation: fadeUp 1s 0.3s ease forwards; opacity: 0;
  }
  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; animation: fadeUp 1s 0.4s ease forwards; opacity: 0; }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5)); }
  .divider-line.right { background: linear-gradient(90deg, rgba(201,168,76,0.5), transparent); }
  .divider-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
  .main-name {
    font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 8vw, 3.8rem); font-weight: 900;
    color: var(--cream); text-align: center; line-height: 1; letter-spacing: -0.01em;
    animation: fadeUp 1s 0.5s ease forwards; opacity: 0;
  }
  .main-name span { color: var(--gold); }
  .subtitle {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.05rem;
    color: rgba(248,243,232,0.6); text-align: center; margin-top: 0.4rem; letter-spacing: 0.05em;
    animation: fadeUp 1s 0.6s ease forwards; opacity: 0;
  }
  .section-divider { margin: 1.8rem 0; display: flex; align-items: center; gap: 12px; animation: fadeUp 1s 0.7s ease forwards; opacity: 0; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.25); }
  .section-divider-icon { color: var(--gold); font-size: 1rem; }
  .details { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; animation: fadeUp 1s 0.8s ease forwards; opacity: 0; }
  .detail-block { text-align: center; padding: 1.2rem 1rem; border: 1px solid rgba(201,168,76,0.18); background: rgba(201,168,76,0.03); position: relative; }
  .detail-block::before { content: ''; position: absolute; top: -1px; left: 10%; right: 10%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .detail-icon { font-size: 1.3rem; display: block; margin-bottom: 0.4rem; }
  .detail-label { font-family: 'Cinzel', serif; font-size: 0.52rem; letter-spacing: 0.25em; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 0.5rem; }
  .detail-value { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--cream); line-height: 1.3; font-weight: 400; }
  .detail-value em { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.9rem; color: rgba(248,243,232,0.65); display: block; margin-top: 0.15rem; }
  .location-block { grid-column: 1 / -1; }
  .footer-msg { margin-top: 1.8rem; text-align: center; animation: fadeUp 1s 1s ease forwards; opacity: 0; }
  .footer-msg p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: rgba(248,243,232,0.55); line-height: 1.6; }
  .footer-msg .highlight { color: var(--gold-light); font-style: normal; }
  .bottom-bar { height: 5px; background: linear-gradient(90deg, transparent, var(--blue-sash), rgba(58,163,212,0.5), var(--blue-sash), transparent); margin-top: 2rem; }
</style>
</head>
